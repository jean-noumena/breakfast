breakfast.Participant:
  everyone:
    set:
      claims:
        iss:
          - "http://localhost:11000/realms/breakfast"
          # - "https://keycloak-public-breakfast.noumena.cloud/realms/breakfast"
  admin:
    extract:
      claims:
        - role
  emailservice:
    set:
      claims:
        party:
          - "email_connector"

breakfast.BreakfastEvent:
  everyone:
    set:
      claims:
        iss:
          - "http://localhost:11000/realms/breakfast"
          # - "https://keycloak-public-breakfast.noumena.cloud/realms/breakfast"
  organizer:
    set:
      claims:
        preferred_username:
          - ""
        email:
          - ""
  admin:
    set:
      claims:
        role:
          - "admin"
  emailservice:
    set:
      claims:
        party:
          - "email_connector"
